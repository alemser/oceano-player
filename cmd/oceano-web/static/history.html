<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oceano · Metrics</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <header id="page-header">
    <a href="/" id="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Library
    </a>
    <h1 id="page-title">Listening Metrics</h1>
    <div id="header-right">
      <div class="period-toggle" role="group" aria-label="Time period">
        <button class="period-btn" data-days="7"  onclick="setPeriod(7)">7d</button>
        <button class="period-btn" data-days="30" onclick="setPeriod(30)">30d</button>
        <button class="period-btn" data-days="0"  onclick="setPeriod(0)">All</button>
      </div>
    </div>
  </header>

  <main id="page-main">

    <!-- Stats cards -->
    <section id="stats-grid" aria-label="Statistics">
      <div class="stat-card">
        <div class="stat-value" id="stat-plays">—</div>
        <div class="stat-label" id="stat-plays-label">Plays</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-hours">—</div>
        <div class="stat-label" id="stat-hours-label">Hours</div>
        <div id="stat-hours-detail"></div>
      </div>
      <div class="stat-card">
        <div class="top-artists-list" id="stat-top-artist"></div>
        <div class="stat-label" id="stat-artists-label">Top artists</div>
      </div>
      <div class="stat-card" id="stat-sources-card">
        <div class="stat-label">Sources</div>
        <div id="stat-sources-chart"></div>
      </div>
      <div class="stat-card" id="stat-stylus-card">
        <div class="stat-value" id="stat-stylus-title">Stylus tracking</div>
        <div class="stat-label">Stylus wear</div>
        <div class="stat-detail" id="stat-stylus-model">Not configured</div>
        <div class="stylus-mini-row">
          <span id="stat-stylus-state" class="stylus-mini-state">OFF</span>
          <span id="stat-stylus-wear" class="stylus-mini-wear">—</span>
        </div>
        <div class="stylus-mini-progress" aria-hidden="true">
          <span id="stat-stylus-progress"></span>
        </div>
        <div class="stat-detail" id="stat-stylus-remaining">—</div>
      </div>
    </section>


  </main>

  <script src="history.js"></script>
</body>
</html>
