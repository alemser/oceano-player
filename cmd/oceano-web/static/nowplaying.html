<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!--
    Viewport is fixed at 1024×600 to match the target 7" HDMI monitor (1024×600 IPS).
    The page is also usable on larger screens during local development — it will simply
    be centred in the browser window.
  -->
  <meta name="viewport" content="width=1024">
  <title>Oceano — Now Playing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07090f;
      --surface:      #10131c;
      --border:       #1e2231;
      --text:         #e8eaf0;
      --text-dim:     #7c839a;
      --text-faint:   #3a3f52;
      --accent:       #4a9eff;
      --chip-text:    #aeb8d5;
      --chip-bg:      rgba(18, 25, 42, 0.35);
      --chip-border:  rgba(84, 106, 156, 0.45);
      --radius:       12px;
      --artwork-size: 340px;
    }

    html, body {
      width: 1024px;
      height: 600px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    body {
      position: relative;
      isolation: isolate;
    }

    /* Subtle light bloom so the upper half does not feel empty on larger displays. */
    body::before {
      content: "";
      position: absolute;
      inset: -120px -140px auto -120px;
      height: 340px;
      background:
        radial-gradient(60% 90% at 18% 40%, rgba(74, 158, 255, 0.18), transparent 70%),
        radial-gradient(50% 70% at 65% 10%, rgba(117, 146, 255, 0.12), transparent 78%);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(5, 8, 16, 0.22), rgba(5, 8, 16, 0));
      z-index: -1;
      pointer-events: none;
    }

    /* ─── Layout ──────────────────────────────────────────────── */

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      padding: 18px 32px 24px;
      gap: 0;
    }

    /* ─── Source bar (top) ─────────────────────────────────────── */

    #source-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding: 9px 14px;
      border: 1px solid rgba(67, 84, 126, 0.22);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(21, 29, 48, 0.56), rgba(17, 23, 39, 0.22));
    }

    #source-icon {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      color: #9aa8cc;
      transition: color 0.4s;
    }

    #source-icon svg { width: 100%; height: 100%; display: block; }

    #source-label {
      font-size: 0.94rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #a7b2d1;
      transition: color 0.4s;
    }

    #playback-badge {
      margin-left: auto;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-faint);
      transition: all 0.4s;
    }

    #playback-badge.playing {
      border-color: #2a5a3a;
      color: #5ecb80;
    }

    /* ─── Main content ─────────────────────────────────────────── */

    #content {
      display: grid;
      grid-template-columns: var(--artwork-size) 1fr;
      gap: 44px;
      align-items: start;
      padding-top: 6px;
      min-height: 0;
    }

    /* ─── Artwork ──────────────────────────────────────────────── */

    #artwork-wrap {
      width: var(--artwork-size);
      height: var(--artwork-size);
      flex-shrink: 0;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #artwork-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s;
    }

    /* Default artwork shown when no real artwork is available */
    #artwork-default {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      transition: opacity 0.4s;
    }

    #artwork-default svg { width: 120px; height: 120px; }

    /* ─── Metadata ─────────────────────────────────────────────── */

    #meta {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 0;
      min-width: 0;
      padding-right: 8px;
      padding-top: 54px;
    }

    #track-title {
      font-size: 2.1rem;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: opacity 0.4s;
      margin-bottom: 10px;
    }

    #track-artist {
      font-size: 1.45rem;
      font-weight: 500;
      color: #98a3c4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.4s;
      margin-bottom: 4px;
    }

    #track-album {
      font-size: 1.08rem;
      color: #677094;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.4s;
      margin-bottom: 22px;
    }

    /* Divider */
    #meta-divider {
      width: 42px;
      height: 2px;
      background: rgba(108, 126, 166, 0.4);
      border-radius: 2px;
      margin-bottom: 16px;
      transition: opacity 0.4s;
    }

    /* Format / supplemental chips */
    #meta-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      transition: opacity 0.4s;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--chip-text);
      background: var(--chip-bg);
      padding: 5px 12px;
      border: 1px solid var(--chip-border);
      border-radius: 20px;
      box-shadow: inset 0 0 0 1px rgba(18, 28, 48, 0.3);
    }

    .chip svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ─── Idle screen ──────────────────────────────────────────── */

    #idle-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s;
      z-index: 10;
    }

    #idle-screen.visible { opacity: 1; pointer-events: auto; }

    #idle-logo { color: var(--text-faint); }
    #idle-logo svg { width: 56px; height: 56px; display: block; }

    #idle-label {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    #idle-time {
      font-size: 3.5rem;
      font-weight: 200;
      letter-spacing: 0.04em;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Identifying overlay ──────────────────────────────────── */

    #identifying-label {
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: 20px;
      transition: opacity 0.4s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
    }

    .pulsing { animation: pulse 1.8s ease-in-out infinite; }

    /* ─── Connection indicator ─────────────────────────────────── */

    #conn-dot {
      position: fixed;
      bottom: 14px;
      right: 18px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: background 0.4s;
      z-index: 20;
    }

    #conn-dot.connected { background: #3a7a4a; }
    #conn-dot.error     { background: #7a3a3a; }

  </style>
</head>
<body>

<!-- Idle screen (shown when no source is active) -->
<div id="idle-screen" class="visible">
  <div id="idle-logo">
    <!-- Oceano waveform icon -->
    <svg viewBox="0 0 52 52" fill="currentColor" aria-hidden="true">
      <rect x="0"  y="16" width="8" height="20" rx="4"/>
      <rect x="11" y="9"  width="8" height="34" rx="4"/>
      <rect x="22" y="3"  width="8" height="46" rx="4"/>
      <rect x="33" y="12" width="8" height="28" rx="4"/>
      <rect x="44" y="17" width="8" height="18" rx="4"/>
    </svg>
  </div>
  <div id="idle-time"></div>
  <div id="idle-label">Oceano Player</div>
</div>

<!-- Main playing UI -->
<div id="app">

  <!-- Source bar -->
  <div id="source-bar">
    <div id="source-icon" aria-hidden="true"></div>
    <span id="source-label">—</span>
    <span id="playback-badge">Stopped</span>
  </div>

  <!-- Artwork + metadata -->
  <div id="content">

    <div id="artwork-wrap">
      <img id="artwork-img" src="" alt="Album artwork" style="opacity:0">
      <div id="artwork-default">
        <!-- Generic vinyl/music disc placeholder -->
        <svg viewBox="0 0 120 120" fill="none" aria-hidden="true">
          <circle cx="60" cy="60" r="56" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          <circle cx="60" cy="60" r="40" stroke="currentColor" stroke-width="1"   opacity="0.2"/>
          <circle cx="60" cy="60" r="24" stroke="currentColor" stroke-width="1"   opacity="0.2"/>
          <circle cx="60" cy="60" r="7"  fill="currentColor" opacity="0.25"/>
          <!-- stylised note -->
          <path d="M54 45 L54 63 Q54 67 50 67 Q46 67 46 63 Q46 59 50 59 Q52 59 54 60 L54 49 L66 46 L66 58 Q66 62 62 62 Q58 62 58 58 Q58 54 62 54 Q64 54 66 55"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/>
        </svg>
      </div>
    </div>

    <div id="meta">
      <div id="track-title">—</div>
      <div id="track-artist"></div>
      <div id="track-album"></div>
      <div id="meta-divider"></div>
      <div id="meta-chips"></div>
      <div id="identifying-label"></div>
    </div>

  </div>
</div>

<!-- Connection status dot -->
<div id="conn-dot" title="Stream connection"></div>

<script>
"use strict";

// ─── Source icon SVGs ─────────────────────────────────────────────────────────
// All icons are original geometric representations, not brand trademarks.

const SOURCE_ICONS = {
  AirPlay: `<svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
    <path d="M16 22 L8 30 L24 30 Z"/>
    <path d="M16 6C21.5 6 26 10.5 26 16L24 16C24 11.6 20.4 8 16 8C11.6 8 8 11.6 8 16L6 16C6 10.5 10.5 6 16 6Z"/>
    <path d="M16 11C19.3 11 22 13.7 22 17L20 17C20 14.8 18.2 13 16 13C13.8 13 12 14.8 12 17L10 17C10 13.7 12.7 11 16 11Z"/>
    <path d="M16 16C17.7 16 19 17.3 19 19L17 19C17 18.4 16.6 18 16 18C15.4 18 15 18.4 15 19L13 19C13 17.3 14.3 16 16 16Z"/>
  </svg>`,

  Bluetooth: `<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <polyline points="10,22 22,10 16,4 16,28 22,22 10,10"/>
  </svg>`,

  UPnP: `<svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
    <circle cx="16" cy="8"  r="3"/>
    <circle cx="6"  cy="24" r="3"/>
    <circle cx="26" cy="24" r="3"/>
    <line x1="16" y1="11" x2="6"  y2="21" stroke="currentColor" stroke-width="1.5"/>
    <line x1="16" y1="11" x2="26" y2="21" stroke="currentColor" stroke-width="1.5"/>
    <line x1="8"  y1="24" x2="24" y2="24" stroke="currentColor" stroke-width="1.5"/>
  </svg>`,

  Vinyl: `<svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
    <circle cx="16" cy="16" r="13"  stroke="currentColor" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="9.5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
    <circle cx="16" cy="16" r="6"   stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
    <circle cx="16" cy="16" r="2.5" fill="currentColor" opacity="0.6"/>
  </svg>`,

  CD: `<svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
    <circle cx="16" cy="16" r="13"  stroke="currentColor" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="8"   stroke="currentColor" stroke-width="0.8" opacity="0.35"/>
    <circle cx="16" cy="16" r="3"   stroke="currentColor" stroke-width="1.5"/>
    <path d="M16 3 A13 13 0 0 1 29 16" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" opacity="0.5"/>
  </svg>`,

  Physical: `<svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
    <circle cx="16" cy="16" r="13"  stroke="currentColor" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="8"   stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
    <circle cx="16" cy="16" r="3.5" fill="currentColor"  opacity="0.5"/>
  </svg>`,

  None: `<svg viewBox="0 0 32 32" fill="currentColor" aria-hidden="true">
    <rect x="2"  y="14" width="6" height="10" rx="3" opacity="0.25"/>
    <rect x="10" y="9"  width="6" height="15" rx="3" opacity="0.25"/>
    <rect x="18" y="5"  width="6" height="19" rx="3" opacity="0.25"/>
    <rect x="26" y="12" width="6" height="12" rx="3" opacity="0.25"/>
  </svg>`,
};

const SOURCE_LABELS = {
  AirPlay:  'AirPlay',
  Bluetooth:'Bluetooth',
  UPnP:     'UPnP',
  Vinyl:    'Vinyl',
  CD:       'CD',
  Physical: 'Physical',
  None:     '—',
};

// ─── DOM refs ────────────────────────────────────────────────────────────────

const $idle       = document.getElementById('idle-screen');
const $idleTime   = document.getElementById('idle-time');
const $sourceIcon = document.getElementById('source-icon');
const $sourceLabel  = document.getElementById('source-label');
const $badge      = document.getElementById('playback-badge');
const $artImg     = document.getElementById('artwork-img');
const $artDefault = document.getElementById('artwork-default');
const $title      = document.getElementById('track-title');
const $artist     = document.getElementById('track-artist');
const $album      = document.getElementById('track-album');
const $chips      = document.getElementById('meta-chips');
const $identifying= document.getElementById('identifying-label');
const $connDot    = document.getElementById('conn-dot');

// ─── Idle clock ──────────────────────────────────────────────────────────────

function tickClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  $idleTime.textContent = h + ':' + m;
}
tickClock();
setInterval(tickClock, 10_000);

// ─── Artwork helpers ─────────────────────────────────────────────────────────

let _lastArtworkPath = null;

function updateArtwork(artworkPath) {
  if (artworkPath === _lastArtworkPath) return;
  _lastArtworkPath = artworkPath;

  if (artworkPath) {
    const img = new Image();
    img.onload = () => {
      $artImg.src = img.src;
      $artImg.style.opacity = '1';
      $artDefault.style.opacity = '0';
    };
    img.onerror = () => showDefaultArtwork();
    // Bust cache between track changes by appending the path as a cache-busting
    // parameter — the server serves the same bytes but the URL is new.
    img.src = '/api/artwork?' + encodeURIComponent(artworkPath);
  } else {
    showDefaultArtwork();
  }
}

function showDefaultArtwork() {
  $artImg.style.opacity = '0';
  $artDefault.style.opacity = '1';
  _lastArtworkPath = null;
}

// ─── Chip builders ───────────────────────────────────────────────────────────

function chipSVG(pathD) {
  return `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
    <path d="${pathD}"/>
  </svg>`;
}

function makeChip(icon, label) {
  const el = document.createElement('span');
  el.className = 'chip';
  el.innerHTML = icon + label;
  return el;
}

// ─── Main UI update ──────────────────────────────────────────────────────────

let _lastState = null;

function applyState(state) {
  const source  = state.source  || 'None';
  const playing = state.state === 'playing';
  const track   = state.track   || null;

  const isIdle = !playing || source === 'None';
  $idle.classList.toggle('visible', isIdle);

  // Source icon + label
  $sourceIcon.innerHTML  = SOURCE_ICONS[source] || SOURCE_ICONS.None;
  $sourceLabel.textContent = SOURCE_LABELS[source] || source;

  // Playback badge
  $badge.textContent = playing ? 'Playing' : 'Stopped';
  $badge.classList.toggle('playing', playing);

  // Track metadata
  const hasTrack = track && (track.title || track.artist);
  $identifying.className = '';
  $identifying.textContent = '';

  if (hasTrack) {
    $title.textContent  = track.title  || '—';
    $artist.textContent = track.artist || '';
    $album.textContent  = track.album  || '';
    updateArtwork(track.artwork_path || null);
  } else if (playing && source !== 'None') {
    // Playing but not yet identified (physical source recognizing)
    $title.textContent  = 'Identifying…';
    $artist.textContent = '';
    $album.textContent  = '';
    $identifying.className = 'pulsing';
    $identifying.textContent = 'Listening for a match';
    showDefaultArtwork();
  } else {
    $title.textContent  = '—';
    $artist.textContent = '';
    $album.textContent  = '';
    showDefaultArtwork();
  }

  // Supplemental chips (format-specific metadata)
  $chips.textContent = '';

  if (track) {
    // Streaming: sample rate + bit depth
    if (track.samplerate) {
      $chips.appendChild(makeChip(
        chipSVG('M1 6 Q3 2 5 6 Q7 10 9 6 Q11 2 11 6'),
        track.samplerate
      ));
    }
    if (track.bitdepth) {
      $chips.appendChild(makeChip(
        chipSVG('M2 9 L2 3 M2 6 L6 3 M6 3 L6 9 M6 6 L10 3 M10 3 L10 9'),
        track.bitdepth
      ));
    }

    // CD: track number
    if (track.track_number && (source === 'CD' || source === 'Physical')) {
      const cdNum = track.track_number;
      // If the track_number looks like a vinyl position (A1, B2, etc.),
      // parse it as side + track; otherwise treat it as a plain CD track.
      const vinylMatch = /^([A-Da-d])(\d+)$/.exec(cdNum.trim());
      if (vinylMatch && source === 'Vinyl') {
        const side = vinylMatch[1].toUpperCase();
        const num  = vinylMatch[2];
        $chips.appendChild(makeChip(
          chipSVG('M6 1 L6 11 M1 4 L6 1 L11 4'),
          'Side ' + side
        ));
        $chips.appendChild(makeChip(
          chipSVG('M2 6 Q2 2 6 2 Q10 2 10 6 Q10 10 6 10 Q2 10 2 6'),
          'Track ' + num
        ));
      } else if (source === 'CD') {
        $chips.appendChild(makeChip(
          chipSVG('M2 6 Q2 2 6 2 Q10 2 10 6 Q10 10 6 10 Q2 10 2 6'),
          'Track ' + cdNum
        ));
      } else if (source === 'Vinyl') {
        // Free-form vinyl track info
        $chips.appendChild(makeChip(
          chipSVG('M6 1 L6 11 M1 4 L6 1 L11 4'),
          cdNum
        ));
      }
    }
  }

  // Store for change detection
  _lastState = state;
}

// ─── SSE connection ──────────────────────────────────────────────────────────

let _es = null;
let _reconnectTimer = null;

function connect() {
  if (_es) { _es.close(); _es = null; }

  _es = new EventSource('/api/stream');

  _es.onopen = () => {
    $connDot.className = 'connected';
    clearTimeout(_reconnectTimer);
  };

  _es.onmessage = (e) => {
    try {
      const state = JSON.parse(e.data);
      applyState(state);
    } catch (err) {
      console.warn('nowplaying: bad state payload', err);
    }
  };

  _es.onerror = () => {
    $connDot.className = 'error';
    _es.close();
    _es = null;
    // Exponential back-off: retry after 3 s, then browser will handle reconnects.
    clearTimeout(_reconnectTimer);
    _reconnectTimer = setTimeout(connect, 3000);
  };
}

// Kick off initial connection.
connect();
</script>
</body>
</html>
