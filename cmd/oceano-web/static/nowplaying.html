<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Oceano — Now Playing</title>
  <link rel="stylesheet" href="/nowplaying.css">
</head>
<body>

<div id="top-controls">
  <!-- Amp indicator (appears above all screens) -->
  <div class="amp-indicator" id="amp-indicator" style="display:none">
    <span class="amp-indicator-label" id="amp-label">—</span>
  </div>
</div>

<!-- Idle screen (shown when no source is active) -->
<div id="idle-screen" class="visible">
  <!-- Power button — top right corner -->
  <button id="idle-power-btn" type="button" aria-label="Power options" title="Power options" onclick="openPowerDialog()">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 3v9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M6.34 6.34A9 9 0 1 0 17.66 6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Main content: clock (left) + weather (right) -->
  <div id="idle-main">
    <!-- Clock widget -->
    <div id="idle-clock-widget">
      <div id="idle-time"></div>
      <div id="idle-date"></div>
    </div>

    <!-- Weather widget -->
    <div id="idle-weather-widget" aria-label="Weather">
      <div id="idle-weather-icon-wrap">
        <span id="idle-weather-icon" aria-hidden="true"></span>
      </div>
      <div id="idle-weather-temp"></div>
      <div id="idle-weather-cond"></div>
    </div>
  </div>
</div>

<div class="power-overlay" id="power-dialog" onclick="if(event.target===this)closePowerDialog()">
  <div class="power-dialog">
    <h3>System power</h3>
    <p>Choose an action for the Raspberry Pi.</p>
    <div class="power-dialog-actions">
      <button class="btn-power-shutdown" onclick="sendPowerAction('shutdown')">Shut down</button>
      <button class="btn-power-restart" onclick="sendPowerAction('restart')">Restart</button>
      <button class="btn-power-cancel" onclick="closePowerDialog()">Cancel</button>
    </div>
  </div>
</div>

<!-- Main playing UI -->
<div id="app" style="position:relative">

  <!-- Source bar -->
  <div id="source-bar">
    <div id="source-icon" aria-hidden="true"></div>
    <span id="source-label">—</span>
    <span id="playback-badge">Stopped</span>
  </div>

  <!-- Artwork + metadata -->
  <div id="content">

    <div id="artwork-wrap">
      <img id="artwork-img" src="" alt="Album artwork" style="opacity:0">
      <div id="artwork-default">
        <!-- Generic vinyl/music disc placeholder -->
        <svg viewBox="0 0 120 120" fill="none" aria-hidden="true">
          <circle cx="60" cy="60" r="56" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          <circle cx="60" cy="60" r="40" stroke="currentColor" stroke-width="1"   opacity="0.2"/>
          <circle cx="60" cy="60" r="24" stroke="currentColor" stroke-width="1"   opacity="0.2"/>
          <circle cx="60" cy="60" r="7"  fill="currentColor" opacity="0.25"/>
          <!-- stylised note -->
          <path d="M54 45 L54 63 Q54 67 50 67 Q46 67 46 63 Q46 59 50 59 Q52 59 54 60 L54 49 L66 46 L66 58 Q66 62 62 62 Q58 62 58 58 Q58 54 62 54 Q64 54 66 55"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.2"/>
        </svg>
      </div>
    </div>

    <div id="meta">
      <div id="meta-source">
        <div id="meta-source-icon" aria-hidden="true"></div>
        <span id="meta-source-label">—</span>
        <span id="meta-playback-badge">Stopped</span>
      </div>
      <div id="track-title">—</div>
      <div id="track-artist"></div>
      <div id="track-album"></div>
      <div id="meta-divider"></div>
      <div id="meta-chips"></div>
      <div id="stream-progress">
        <div id="stream-progress-bar"><div id="stream-progress-fill"></div></div>
        <div id="stream-progress-times">
          <span id="stream-elapsed">0:00</span>
          <span id="stream-total">0:00</span>
        </div>
      </div>
      <div id="identifying-label"></div>
    </div>

  </div>
</div>

<script src="/nowplaying_helpers.js"></script>
<script src="/nowplaying_clock.js"></script>
<script src="/nowplaying_weather.js"></script>
<script src="/icons.js"></script>
<script src="/nowplaying.js"></script>
</body>
</html>
